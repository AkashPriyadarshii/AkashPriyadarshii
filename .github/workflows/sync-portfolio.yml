name: Sync Portfolio

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Portfolio Auto-Sync
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -H "x-sync-secret: ${{ secrets.PORTFOLIO_SYNC_SECRET }}" \
            https://akashpriyadarshi.vercel.app/api/github/sync
